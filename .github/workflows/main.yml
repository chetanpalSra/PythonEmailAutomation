name: Daily Midnight Script

on:
  schedule:
    # Runs at 00:00 UTC every single day
    - cron: '0 0 * * *'
  workflow_dispatch: # Keeps the "Run Manual" button active

# Prevents multiple instances of the script running at once
concurrency:
  group: daily-task
  cancel-in-progress: true

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5 # Updated to v5 for 2026 stability
        with:
          python-version: '3.13'
          cache: 'pip' # Speeds up execution by caching your libraries

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Execute Python Script
        env:
          MY_SECRET_API_KEY: ${{ secrets.MY_SECRET_API_KEY }}
        run: python mam_solution.py
