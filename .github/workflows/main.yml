name: Daily Midnight Script

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch: # Keeps the "Run Manual" button active

# Prevents multiple instances of the script running at once
concurrency:
  group: daily-task
  cancel-in-progress: true

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip' # Speeds up execution by caching your libraries

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Execute Python Script
        env:
          MY_SECRET_API_KEY: ${{ secrets.MY_SECRET_API_KEY }}
        run: python mam_solution.py
